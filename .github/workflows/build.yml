name: VaN3Twin Smoke Build

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - claude/**

jobs:
  smoke-build:
    runs-on: ubuntu-22.04

    env:
      CCACHE_DIR: ~/.ccache
      CC: ccache gcc
      CXX: ccache g++

    steps:
      - name: Checkout VaN3Twin
        uses: actions/checkout@v4

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            git \
            python3 \
            ccache \
            pkg-config \
            libgsl-dev \
            libgslcblas0 \
            libsqlite3-dev \
            libxml2-dev \
            libssl-dev \
            libboost-dev \
            libzmq3-dev

      - name: Clone ns-3
        run: |
          git clone \
            --depth=1 \
            -b ns-3-dev-v2x-v0.2 \
            https://gitlab.com/cttc-lena/ns-3-dev.git

      - name: Clone NR module
        run: |
          git clone \
            --depth=1 \
            -b nr-v2x-dev \
            https://gitlab.com/cttc-lena/nr.git \
            ns-3-dev/src/nr

      - name: Copy VaN3Twin sources
        run: |
          cp -rf src/. ns-3-dev/src/

      - name: Enable C language
        run: |
          sed -i -E \
            's#^([[:blank:]]*)project\(NS3 CXX\)#\1project\(NS3 C CXX\)#' \
            ns-3-dev/CMakeLists.txt

      - name: Apply basic patches
        run: |
          cd ns-3-dev

          cp src/automotive/propagation-extended/cni-urbanmicrocell-propagation-loss-model.* \
             src/propagation/model/

          cp src/automotive/propagation-extended/CMakeLists.txt \
             src/propagation/

          cp src/automotive/model/TxTracker/channel_files/modified/yans-wifi-phy.h \
             src/wifi/model/

      - name: Configure ns-3
        working-directory: ns-3-dev
        run: |
          ./ns3 configure \
            --build-profile=debug \
            --disable-tests \
            --disable-python \
            --disable-examples

      - name: Build automotive module only
        working-directory: ns-3-dev
        run: |
          ninja -C build ns3-automotive -j2

      - name: Show ccache stats
        run: |
          ccache -s || true
